version: '3.8'

services:
  mongo-test:
    image: mongo
    container_name: notes-api-mongo-test
    ports:
      - "27019:27017"
    tmpfs:
      - /data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 3s
      retries: 5